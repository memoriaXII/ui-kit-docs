<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI Kit Preview</title>
    <style>
      /* Loaded BEFORE any brand CSS so even during the first paint the
         body never shows the brand --fill-white. The !important is here
         so the brand stylesheet (which paints body with the page tint)
         can never win — partners use brand colors on the components,
         not on the surrounding chrome. */
      html,
      body,
      #root {
        margin: 0 !important;
        padding: 0 !important;
        background: transparent !important;
      }
      /* Allow scrolling inside the iframe — the docs preview slot caps
         height at 450px, but some previews (Button, Card, Drawer) have
         multiple variants stacked vertically and need to scroll. */
      body {
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
